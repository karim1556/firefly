services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: firefly
      POSTGRES_USER: firefly
      POSTGRES_PASSWORD: firefly
    volumes:
      - firefly_pg_prod:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_URL: http://localhost:3000
      DATABASE_URL: postgresql://firefly:firefly@postgres:5432/firefly?schema=public
      JWT_ACCESS_SECRET: please-change-this-access-secret
      JWT_REFRESH_SECRET: please-change-this-refresh-secret
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL_DAYS: 7
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"

volumes:
  firefly_pg_prod:
