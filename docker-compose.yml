services:
  postgres:
    image: postgres:16-alpine
    container_name: firefly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: firefly
      POSTGRES_USER: firefly
      POSTGRES_PASSWORD: firefly
    ports:
      - "5432:5432"
    volumes:
      - firefly_postgres_data:/var/lib/postgresql/data

volumes:
  firefly_postgres_data:
